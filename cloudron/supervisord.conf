[unix_http_server]
file=/run/supervisor.sock

[supervisord]
logfile=/run/supervisord.log
logfile_maxbytes=4MB
logfile_backups=2
loglevel=info
pidfile=/run/supervisord.pid
nodaemon=true
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///run/supervisor.sock

# ── nginx: serves SPA + reverse-proxies to node and PocketBase ───────────────
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;" -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

# ── PocketBase: embedded database / API ──────────────────────────────────────
[program:pocketbase]
command=/app/pocketbase/pocketbase serve
    --dir=/app/data/pb_data
    --http=127.0.0.1:8090
    --origins=*
autostart=true
autorestart=true
startretries=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

# ── Node.js: ICS calendar feed endpoint ──────────────────────────────────────
[program:node]
command=node /app/server.js
environment=PORT="3001",NODE_ENV="production"
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30
