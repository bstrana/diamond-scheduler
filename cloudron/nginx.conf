server {
    listen 8000;
    root /app/data/dist;
    index index.html;

    # PocketBase payload limit matches the 5 MB maxSize on app_state and
    # published_schedules. Explicit here so the policy is visible.
    client_max_body_size 6m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                   always;
    add_header X-Frame-Options          "SAMEORIGIN"                always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src __KC_ORIGIN__; frame-ancestors 'self';"
        always;

    # ── Embeddable widget – allow cross-origin iframe embedding ─────────────
    # nginx add_header in a location block replaces parent-level headers, so
    # all desired headers must be re-declared here (X-Frame-Options is omitted
    # intentionally so frame-ancestors * in the CSP takes full effect).
    location = /embed.html {
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src __KC_ORIGIN__; frame-ancestors *;"
            always;
        try_files $uri /index.html;
    }

    # ── Stream overlay – allow embedding in OBS and external broadcast tools ──
    # Same as embed.html: X-Frame-Options omitted so frame-ancestors * wins.
    location = /stream-overlay.html {
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src __KC_ORIGIN__; frame-ancestors *;"
            always;
        try_files $uri /index.html;
    }

    # ── ICS subscription feed → node.js ──────────────────────────────────────
    location = /subscribe.ics {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Public schedule JSON API → node.js ───────────────────────────────────
    location = /schedule.json {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # ── PocketBase API + realtime ─────────────────────────────────────────────
    # Browser JS talks to https://APP_DOMAIN/_pb/... which proxies here.
    # __PB_PROXY_PASS__ is substituted at startup (start.sh):
    #   PB_WRITE_PROTECTION=false  →  http://127.0.0.1:8090/        (direct)
    #   PB_WRITE_PROTECTION=true   →  http://127.0.0.1:3001/_pb-proxy/  (Node.js gate)
    # X-Internal-Token is always injected so PocketBase collection rules
    # can reject requests that bypass this proxy entirely.
    location /_pb/ {
        proxy_pass         __PB_PROXY_PASS__;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Internal-Token  __PB_INTERNAL_TOKEN__;

        # PocketBase SSE (realtime subscriptions)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── Health check (Cloudron) ───────────────────────────────────────────────
    location = /health {
        access_log off;
        try_files /health =404;
    }

    # ── WBSC API proxy → node.js ─────────────────────────────────────────────
    location /wbsc-proxy/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── Static SPA ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
